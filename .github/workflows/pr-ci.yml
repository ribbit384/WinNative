name: PR CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'input_controls/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'input_controls/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
    - name: Clone repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 1
        persist-credentials: false

    - name: Cache LFS
      uses: actions/cache@v5
      with:
        path: .git/lfs
        key: lfs-${{ hashFiles('**/*.txz', '**/*.tzst') }}
        restore-keys: lfs-

    - name: Pull LFS files
      run: git lfs pull

    - name: Cache NDK build outputs
      uses: actions/cache@v5
      with:
        path: |
          app/.cxx
          app/build/intermediates/cxx
        key: ndk-${{ hashFiles('app/src/main/cpp/**', 'app/build.gradle', 'app/src/main/cpp/CMakeLists.txt') }}
        restore-keys: ndk-

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        validate-wrappers: true
        cache-cleanup: 'on-success'

    - name: Seed caches (full debug build)
      if: github.event_name == 'push'
      timeout-minutes: 25
      env:
        GRADLE_OPTS: -Xmx4g -XX:+UseG1GC
      run: |
        export KEYSTORE_FILE="${{ github.workspace }}/release.jks"
        export KEYSTORE_PASSWORD="dummypass"
        export KEY_ALIAS="winnative"
        export KEY_PASSWORD="dummypass"
        keytool -genkey -v \
          -keystore "$KEYSTORE_FILE" \
          -alias winnative \
          -keyalg RSA -keysize 2048 -validity 1 \
          -storepass dummypass -keypass dummypass \
          -dname "CN=CI, OU=CI, O=CI, L=CI, ST=CI, C=US"
        ./gradlew :app:assembleDebug --build-cache --parallel -x lint

    - name: Decode keystore and build
      if: github.event_name == 'pull_request'
      timeout-minutes: 15
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        GRADLE_OPTS: -Xmx4g -XX:+UseG1GC
      run: |
        export KEYSTORE_FILE="${{ github.workspace }}/release.jks"
        if [ -n "$KEYSTORE_BASE64" ]; then
          echo "$KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_FILE"
        else
          export KEYSTORE_PASSWORD="dummypass"
          export KEY_ALIAS="winnative"
          export KEY_PASSWORD="dummypass"
          keytool -genkey -v \
            -keystore "$KEYSTORE_FILE" \
            -alias winnative \
            -keyalg RSA -keysize 2048 -validity 1 \
            -storepass dummypass -keypass dummypass \
            -dname "CN=CI, OU=CI, O=CI, L=CI, ST=CI, C=US"
        fi
        ./gradlew :app:assembleDebug --build-cache --parallel -x lint

    - name: Set short SHA
      if: github.event_name == 'pull_request'
      id: sha
      run: echo "short=$(echo $GITHUB_SHA | cut -c1-7)" >> "$GITHUB_OUTPUT"

    - name: Upload APK
      if: github.event_name == 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: WinNative-debug-PR${{ github.event.pull_request.number }}-${{ steps.sha.outputs.short }}
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
        compression-level: 0

    - name: Cleanup duplicate caches
      continue-on-error: true
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh cache list --repo "$GITHUB_REPOSITORY" --json id,key,createdAt --limit 100 |
          jq -r '
            group_by(.key | sub("-[a-f0-9]{20,}$"; ""))
            | .[]
            | sort_by(.createdAt) | reverse
            | .[1:][]
            | .id
          ' |
          xargs -I {} gh cache delete {} --repo "$GITHUB_REPOSITORY" || true